# nessie-store — release pipeline (tag-triggered).
#
# HOOK PARITY: This is a tag-triggered SUPERSET, not a per-PR gate, so it is
# deliberately NOT mirrored by .githooks/pre-push (like deep-regression/cross-os
# in other repos). The per-PR gate stays ci.yml.
#
# On a `vX.Y.Z` tag this: publishes the Rust crates to crates.io (in dep order),
# builds + publishes the PyO3 wheels to PyPI for **Linux (x86_64 + aarch64),
# macOS (universal2), and Windows (x64)** via abi3 (one wheel per platform, works
# on CPython 3.10+), builds the daemon binary + a GHCR image, and cuts a GitHub
# Release. Every publish step is gated on its secret AND on the ref being a tag,
# so `workflow_dispatch` runs build-only (no publish) for validation, and a tag on
# an unconfigured fork still produces the wheels, binary, image, and Release.

name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {} # build-only validation (publishing is gated on a tag)

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  crates:
    runs-on: ubuntu-24.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # for the pyo3 build scripts (--all crates compile)
      - name: Publish to crates.io (dependency order; tag-only, no-op without a token)
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            echo "::notice::not a tag — skipping crates.io publish"
            exit 0
          fi
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN unset — skipping crates.io publish"
            exit 0
          fi
          for c in nessie-backend-core nessie-ontap-protocol nessie-backend-conformance \
                   nessie-backend-mem nessie-backend-zfs nessie-store; do
            echo "::group::publish $c"
            cargo publish -p "$c" --locked || echo "::warning::publish $c failed (already published?)"
            sleep 20  # crates.io index propagation before the next crate
            echo "::endgroup::"
          done

  # Build abi3 wheels for every crate on every platform. One job per
  # (platform × crate); abi3 means one wheel per platform covers CPython 3.10+.
  wheels:
    name: wheels ${{ matrix.platform.target }} · ${{ matrix.crate }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        crate:
          - nessie-backend-core
          - nessie-ontap-protocol
          - nessie-backend-conformance
          - nessie-backend-mem
          - nessie-backend-zfs
          - nessie-store
        platform:
          - { runner: ubuntu-24.04, target: x86_64-unknown-linux-gnu, manylinux: auto }
          - { runner: ubuntu-24.04, target: aarch64-unknown-linux-gnu, manylinux: auto }
          - { runner: macos-14, target: universal2-apple-darwin, manylinux: "off" }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc, manylinux: "off" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel (abi3)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          # --no-default-features keeps the nessie-store wheel light (config+identity
          # only, no TLS/HTTP stack) so it cross-compiles everywhere; harmless for the
          # other crates (no default features). Each crate's pyproject supplies
          # `features = ["python"]`.
          args: --release --out dist --no-default-features -m crates/${{ matrix.crate }}/Cargo.toml
          # sccache OFF: it mishandles the .S assembly files that ring / aws-lc-sys
          # compile when cross-building nessie-store to aarch64-linux (both crypto
          # crates fail their cc build under sccache). Correctness over cache.
          sccache: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}-${{ matrix.crate }}
          path: dist/*.whl

  # Collect every platform's wheels and publish to PyPI (tag-only). skip-existing
  # + continue-on-error keep re-runs idempotent and never let a PyPI new-project
  # rate-limit fail the release.
  publish-wheels:
    needs: wheels
    if: ${{ !cancelled() && github.ref_type == 'tag' }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # PyPI trusted publishing
      contents: read
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - run: ls -l dist
      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true

  packages:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb and .rpm
        run: |
          set -euo pipefail
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo build --release --locked -p nessie-store
          cargo deb -p nessie-store --no-build
          cargo generate-rpm -p crates/nessie-store
          mkdir -p pkgs
          cp target/debian/*.deb target/generate-rpm/*.rpm pkgs/
          ls -l pkgs
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: pkgs/*

  release:
    runs-on: ubuntu-24.04
    needs: [wheels, packages]
    if: ${{ !cancelled() && github.ref_type == 'tag' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build the daemon binary
        run: cargo build --release --locked -p nessie-store
      - name: Package the binary
        run: |
          set -euo pipefail
          mkdir -p out
          tar -C target/release -czf "out/nessie-store-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" nessie-store
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: out
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: out
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.tar.gz
            out/*.whl
            out/*.deb
            out/*.rpm
          generate_release_notes: true

  docker:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ghcr.io/gilamonster-foundation/nessie-store:${{ github.ref_name }}
            ghcr.io/gilamonster-foundation/nessie-store:latest
