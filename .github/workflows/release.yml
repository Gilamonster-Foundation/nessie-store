# nessie-store — release pipeline (tag-triggered).
#
# HOOK PARITY: This is a tag-triggered SUPERSET, not a per-PR gate, so it is
# deliberately NOT mirrored by .githooks/pre-push (like deep-regression/cross-os
# in other repos). The per-PR gate stays ci.yml.
#
# On a `vX.Y.Z` tag this: publishes the Rust crates to crates.io (in dep order),
# builds + publishes the PyO3 wheels to PyPI, builds the daemon binary + a GHCR
# image, and cuts a GitHub Release. Every publish step is gated on its secret and
# no-ops gracefully when absent, so a tag on an unconfigured fork still produces
# the binary, the image, and the GitHub Release.

name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  crates:
    runs-on: ubuntu-24.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # for the pyo3 build scripts (--all crates compile)
      - name: Publish to crates.io (dependency order; no-op without a token)
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN unset — skipping crates.io publish"
            exit 0
          fi
          for c in nessie-backend-core nessie-ontap-protocol nessie-backend-conformance \
                   nessie-backend-mem nessie-backend-zfs nessie-store; do
            echo "::group::publish $c"
            cargo publish -p "$c" --locked || echo "::warning::publish $c failed (already published?)"
            sleep 20  # crates.io index propagation before the next crate
            echo "::endgroup::"
          done

  wheels:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # PyPI trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build per-crate wheels
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip maturin
          mkdir -p dist
          for pp in crates/*/pyproject.toml; do
            d=$(dirname "$pp")
            echo "::group::wheel $d"
            ( cd "$d" && maturin build --release --out "$GITHUB_WORKSPACE/dist" )
            echo "::endgroup::"
          done
          ls -l dist
      - name: Publish to PyPI (token mode; skipped without a token)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  packages:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb and .rpm
        run: |
          set -euo pipefail
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo build --release --locked -p nessie-store
          cargo deb -p nessie-store --no-build
          cargo generate-rpm -p crates/nessie-store
          mkdir -p pkgs
          cp target/debian/*.deb target/generate-rpm/*.rpm pkgs/
          ls -l pkgs
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: pkgs/*

  release:
    runs-on: ubuntu-24.04
    needs: [wheels, packages]
    steps:
      - uses: actions/checkout@v4
      - name: Build the daemon binary
        run: cargo build --release --locked -p nessie-store
      - name: Package the binary
        run: |
          set -euo pipefail
          mkdir -p out
          tar -C target/release -czf "out/nessie-store-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" nessie-store
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: out
      - uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: out
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.tar.gz
            out/*.whl
            out/*.deb
            out/*.rpm
          generate_release_notes: true

  docker:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gilamonster-foundation/nessie-store:${{ github.ref_name }}
            ghcr.io/gilamonster-foundation/nessie-store:latest
