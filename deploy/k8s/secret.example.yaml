# Admin (basic-auth) password for the daemon. The password is read from the
# NESSIE_ADMIN_PASSWORD env at startup and never written to disk.
#
# This is an EXAMPLE — do not apply as-is. Either edit the value here, or create
# the secret out-of-band so it never lands in git:
#
#   kubectl -n nessie-store create secret generic nessie-store-admin \
#     --from-literal=admin-password='<your-password>'
apiVersion: v1
kind: Secret
metadata:
  name: nessie-store-admin
  namespace: nessie-store
  labels:
    app.kubernetes.io/name: nessie-store
type: Opaque
stringData:
  admin-password: change-me
