# nessie-store configuration. Install to /etc/nessie-store/config.toml.
# Generate a fresh default with: nessie-store init --config config.toml

listen = "0.0.0.0:8443"
data_dir = "/var/lib/nessie-store"
backend = "zfs"

admin_username = "admin"
# Prefer the NESSIE_ADMIN_PASSWORD env (see environment.example); this is the fallback.
admin_password = "admin"

# Reported cluster identity (clients cache the minted UUIDs in data_dir/identity.json).
cluster_name = "nessie-store"
svm_name = "svm0"
node_serial_number = "SIM-1-0000000001"
ontap_version = "9.14.1"
# The data-LIF IP clients mount / Trident probes. Set to this host's reachable IP.
data_lif = "192.168.1.100"

# ZFS backend settings (used when backend = "zfs").
zfs_pool = "ontap-sim"
# Only used when nfs_enabled = false (the legacy host-kernel-NFS export path).
zfs_nfs_clients = ["192.168.0.0/16", "10.42.0.0/16"]
# Owner/mode stamped on each volume root. For a SHARED agent workspace (a pod and
# the host both read/write the same tree), set a set-GID root so new files created
# over NFS inherit the shared group, and let the embedded server own each file as
# its AUTH_UNIX caller (F5). The daemon must hold CAP_CHOWN — it runs as root
# (k8s `privileged: true`) — to own files as arbitrary callers.
# zfs_dataset_owner = "1000:1001"   # uid:gid — e.g. worker uid : shared "agents" gid
# zfs_dataset_mode  = "2775"        # rwxrwsr-x: set-GID so children inherit the group

# Embedded userspace NFS server (the data plane). When true, nessie-store serves
# NFSv3 itself — NO host kernel NFS server (rpc.nfsd/exportfs) is needed, and the
# ZFS backend stops writing /etc/exports.d/. Clients mount with:
#   mount -t nfs -o nfsvers=3,proto=tcp,port=2049,mountport=2049,nolock <data_lif>:/ ...
nfs_enabled = true
nfs_listen = "0.0.0.0:2049"
# Directory tree served; volume junctions mount under it.
nfs_export_root = "/srv"
# Export path clients mount (<host>:/<name>); empty serves the bare root.
nfs_export_name = ""

# Optional REAPI (Bazel remote cache) gRPC face, beside the ONTAP control plane —
# a Bazel remote cache with no BuildBarn to stand up. SHA-256-native (a blob the
# client uploads by its SHA-256 digest is stored under that digest, no index/recompute),
# self-attesting (k=1 write-through). Absent = no REAPI server. Point Bazel at it with:
#   build --remote_cache=grpc://<host>:8980
# [reapi]
# enabled = true
# listen = "0.0.0.0:8980"        # gRPC bind (distinct from the HTTPS `listen` above)
# instance_name = ""             # "" = the default instance
# ac_update_enabled = true       # allow UpdateActionResult (also needs an AC backend + signer)
