\* Cache eviction WITH the replica gate on, a durable node d1, and R = 2. Every
\* reachable blob has a permanent home (d1 never evicts) and the gate keeps >= R
\* copies alive, so NoReachableLost must hold. check.sh asserts no error.
SPECIFICATION Spec

CONSTANTS
    Nodes = {d1, n2, n3}
    Durable = {d1}
    Blobs = {x, y}
    Reachable = {x, y}
    R = 2
    Gate = TRUE

INVARIANT TypeOK
INVARIANT NoReachableLost
