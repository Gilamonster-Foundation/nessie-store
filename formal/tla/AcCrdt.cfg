\* TLC model for AcCrdt: a 2-node swarm, 3 signers of which 1 is Byzantine,
\* K = 2. |Byzantine| = 1 < K = 2, so the no-forgery precondition holds and
\* TLC must find NoForgery / Agreement inviolable and the store monotone.
SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2}
    Signers = {s1, s2, s3}
    Byzantine = {s3}
    Results = {r1, r2}
    K = 2
    TrueResult = r1

INVARIANT TypeOK
INVARIANT NoForgery
INVARIANT Agreement

PROPERTY MonotoneStore
