\* Durable GC with the in-flight write-guard ON: both invariants must hold — a
\* guarded blob is never swept (InflightProtected), and a root is never swept
\* (RootsStored). check.sh asserts this model finds no error.
SPECIFICATION Spec

CONSTANTS
    Blobs = {b1, b2}
    GuardInflight = TRUE

INVARIANT TypeOK
INVARIANT InflightProtected
INVARIANT RootsStored
