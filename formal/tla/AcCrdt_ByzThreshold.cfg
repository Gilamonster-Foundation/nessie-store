\* Boundary model: TWO Byzantine signers with K = 2, so |Byzantine| = K (the
\* Byzantine cohort reaches the threshold). This model is EXPECTED TO FAIL:
\* TLC must report a violation of ForgeryFree, exhibiting a run where s2 and s3
\* both attest the false result r2 and a node confirms it. That counterexample
\* is the proof that k-of-n's safety needs a Byzantine MINORITY (< K). check.sh
\* asserts this failure occurs.
SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2}
    Signers = {s1, s2, s3}
    Byzantine = {s2, s3}
    Results = {r1, r2}
    K = 2
    TrueResult = r1

INVARIANT TypeOK
INVARIANT ForgeryFree
