\* Boundary model: NO replica gate (Gate = FALSE) and NO durable node
\* (Durable = {}). This model is EXPECTED TO FAIL — TLC must report a violation of
\* NoReachableLost, exhibiting a pure cache swarm that evicts every copy of a blob
\* until it is lost swarm-wide. That counterexample proves the replica gate (and a
\* durable backstop) is load-bearing, not decorative.
SPECIFICATION Spec

CONSTANTS
    Nodes = {n1, n2, n3}
    Durable = {}
    Blobs = {x, y}
    Reachable = {x, y}
    R = 2
    Gate = FALSE

INVARIANT TypeOK
INVARIANT NoReachableLost
